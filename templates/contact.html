<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: #f4f4f4;
        }
        
        header {
            background: linear-gradient(to right, #e27107, #c04c09);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
        }
        
        nav a:hover {
            color: orange;
        }
        
        .contact {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .contact h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #ff7300;
        }
        
        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #e27e0c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        
        button:hover {
            background: #da7808;
        }
        
        footer {
            text-align: center;
            background: linear-gradient(to right, #e27107, #c04c09);
            color: white;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <header>
        <h2>Pawan Portfolio</h2>

        <nav>
            <a href="home">Home</a>
            <a href="project">Projects</a>
            <a href="about">About</a>
            <a href="contact">Contact</a>
        </nav>
    </header>

    <section class="contact">
        <h1>Contact Me</h1>

        <form>
            <input type="text" placeholder="Enter your name" required>
            <input type="email" placeholder="Enter your email" required>
            <textarea rows="5" placeholder="Enter your message"></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Pawan Kumar | All Rights Reserved</p>
    </footer>

</body>

</html>
